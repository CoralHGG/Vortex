<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX v2 | Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a855f7;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #0b0813;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; }

        /* --- TELA DE LOGIN --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: rgba(15, 12, 28, 0.8); padding: 40px; border-radius: 20px;
            border: 1px solid var(--border); width: 100%; max-width: 360px; text-align: center;
        }

        /* --- ESTRUTURA CORE DO PAINEL --- */
        #main-panel { display: none; width: 100vw; height: 100vh; display: flex; }
        
        .sidebar {
            width: 260px; height: 100%; background: rgba(15, 12, 28, 0.7);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px;
        }
        .menu-list { list-style: none; flex-grow: 1; margin-top: 30px; }
        .menu-list li {
            padding: 12px 15px; border-radius: 10px; color: #94a3b8;
            cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 5px;
        }
        .menu-list li.active { background: rgba(168, 85, 247, 0.15); color: #fff; font-weight: 600; }
        
        .user-footer { border-top: 1px solid var(--border); padding-top: 15px; }
        .status-dot { width: 8px; height: 8px; background: #64748b; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }

        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }

        /* --- COMPONENTES PADRÃO --- */
        input, select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border); border-radius: 10px; color: #fff; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--primary); }
        button {
            width: 100%; padding: 12px; background: var(--primary); border: none;
            border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 10px; color: #64748b; font-size: 12px; text-transform: uppercase; }
        td { padding: 14px 10px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .badge.online { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .badge.offline { background: rgba(255, 255, 255, 0.05); color: #94a3b8; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 5px; letter-spacing: 2px;">VORTEX</h2>
            <p style="font-size: 12px; color: #64748b; margin-bottom: 25px;">Insira suas credenciais</p>
            <div id="login-err" style="color: var(--danger); font-size: 13px; margin-bottom: 15px; display: none;">Usuário ou senha incorretos.</div>
            <input type="text" id="user-in" placeholder="ID ou Usuário">
            <input type="password" id="pass-in" placeholder="Senha">
            <button onclick="auth()">ACESSAR PAINEL</button>
        </div>
    </div>

    <div id="main-panel">
        <aside class="sidebar">
            <h3>VORTEX CORE</h3>
            <ul class="menu-list">
                <li class="active" onclick="tab('dash', this)"><i class="fas fa-chart-pie"></i> Dashboard</li>
                <li onclick="tab('membros', this)"><i class="fas fa-users"></i> Membros</li>
            </ul>
            <div class="user-footer">
                <div style="font-weight: 600; font-size: 14px;" id="nav-username">Desconectado</div>
                <div style="font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 6px; margin-top: 4px;">
                    <span class="status-dot" id="nav-status-dot"></span> <span id="nav-status-text">Offline</span>
                    <span onclick="logout()" style="color: var(--danger); cursor: pointer; margin-left: auto; font-weight: 600;">Sair</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <section id="dash" class="section active">
                <h2>Dashboard</h2>
                <p style="color: #94a3b8; margin-top: 10px;">Bem-vindo ao novo núcleo do sistema.</p>
            </section>

            <section id="membros" class="section">
                <h2>Controle de Membros</h2>
                <table style="width: 100%;">
                    <thead>
                        <tr><th>ID</th><th>Nome</th><th>Cargo</th><th>Status Real</th></tr>
                    </thead>
                    <tbody id="t-membros-corpo">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script>
        // Banco de Dados Inicial e Único do Sistema
        let db = {
            membros: [
                { id: "3461", nome: "Megan", senha: "1234", cargo: "Chefe", online: false },
                { id: "1002", nome: "Operador Padrão", senha: "999", cargo: "Suporte", online: false }
            ]
        };

        let usuarioLogado = null;

        // Inicialização
        window.onload = function() {
            document.getElementById('main-panel').style.display = 'none'; // Garante o bloqueio inicial
            renderMembros();
        };

        // Autenticação Atualizando o Status
        function auth() {
            const inputUser = document.getElementById('user-in').value.trim();
            const inputPass = document.getElementById('pass-in').value.trim();
            
            // Busca o usuário
            const user = db.membros.find(m => (m.nome.toLowerCase() === inputUser.toLowerCase() || m.id === inputUser) && m.senha === inputPass);

            if (user) {
                usuarioLogado = user;
                user.online = true; // Seta o status para online no banco de dados

                // Atualiza a Interface do Menu Lateral
                document.getElementById('nav-username').innerText = user.nome;
                document.getElementById('nav-status-dot').className = "status-dot online";
                document.getElementById('nav-status-text').innerText = "Online";

                // Troca de tela
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';

                // Recarrega as tabelas para exibir os status corretos atualizados
                renderMembros();
            } else {
                document.getElementById('login-err').style.display = 'block';
            }
        }

        // Logout Limpando e desativando o Status
        function logout() {
            if (usuarioLogado) {
                usuarioLogado.online = false; // Define como offline no banco ao sair
            }
            usuarioLogado = null;

            // Reseta a interface lateral
            document.getElementById('nav-username').innerText = "Desconectado";
            document.getElementById('nav-status-dot').className = "status-dot";
            document.getElementById('nav-status-text').innerText = "Offline";

            // Retorna para a tela de login
            document.getElementById('main-panel').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('user-in').value = '';
            document.getElementById('pass-in').value = '';
            document.getElementById('login-err').style.display = 'none';

            renderMembros();
        }

        // Renderização Dinâmica da Tabela com Validação do Status
        function renderMembros() {
            const tbody = document.getElementById('t-membros-corpo');
            if(!tbody) return;
            
            tbody.innerHTML = "";
            db.membros.forEach(m => {
                // Cria as tags de status baseadas na propriedade booleana real do usuário
                const statusBadge = m.online 
                    ? `<span class="badge online"><i class="fas fa-circle" style="font-size: 8px;"></i> Conectado</span>` 
                    : `<span class="badge offline">Offline</span>`;

                tbody.innerHTML += `
                    <tr>
                        <td>#${m.id}</td>
                        <td style="font-weight: 600;">${m.nome}</td>
                        <td>${m.cargo}</td>
                        <td>${statusBadge}</td>
                    </tr>
                `;
            });
        }

        // Navegação entre abas
        function tab(sectionId, element) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-list li').forEach(li => li.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
